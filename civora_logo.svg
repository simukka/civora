  <title id="title">Civora logo</title>
  <desc id="desc">Civora wordmark with a geometric wireframe cube replacing the O and the tagline Reality. Rewritten Together.</desc>
  <defs>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="civora-accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#D8E7FF"/>
      <stop offset="100%" stop-color="#B690FF"/>
    </linearGradient>
  </defs>
  <style>
