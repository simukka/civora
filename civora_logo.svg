    .mark-orbit { fill: none; stroke: currentColor; stroke-width: 5.4; stroke-linejoin: round; opacity: 0.96; }
    .mark-line { fill: none; stroke: currentColor; stroke-width: 4.2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.98; }
    .mark-fine { fill: none; stroke: currentColor; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.82; }
    .mark-node { fill: currentColor; stroke: none; opacity: 0.98; }
    .accent { stroke: url(#civora-accent); }
  </style>
