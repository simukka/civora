name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test and lint (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bevy's Linux build dependencies. libudev-dev is listed for when
      # gamepad support (bevy_gilrs) is enabled later.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

  build:
    name: Build client (${{ matrix.name }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            binary: civora-client
          - name: windows
            os: windows-latest
            binary: civora-client.exe
          - name: macos
            os: macos-latest
            binary: civora-client
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release client
        run: cargo build --release -p civora-client

      - uses: actions/upload-artifact@v4
        with:
          name: civora-client-${{ matrix.name }}
          path: target/release/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    # Only run when a version tag (v1.2.3) is pushed, not on branch pushes or PRs.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          version="${GITHUB_REF_NAME}"
          mkdir -p dist

          # Linux (tar.gz)
          chmod +x artifacts/civora-client-linux/civora-client
          tar -czf "dist/civora-client-${version}-linux-x86_64.tar.gz" \
            -C artifacts/civora-client-linux civora-client

          # macOS (tar.gz)
          chmod +x artifacts/civora-client-macos/civora-client
          tar -czf "dist/civora-client-${version}-macos-x86_64.tar.gz" \
            -C artifacts/civora-client-macos civora-client

          # Windows (zip)
          ( cd artifacts/civora-client-windows && \
            zip -q "../../dist/civora-client-${version}-windows-x86_64.zip" civora-client.exe )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
